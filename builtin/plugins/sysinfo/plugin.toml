# System vitals: a battery segment (only on laptops) and a `sysinfo` command for
# the full picture (OS, uptime, load, disk, memory). CPU% and memory segments
# live in the `prompt` plugin so they sit before the clock; battery execs are
# cheap (pmset) and the segment hides itself on desktops.
name        = "sysinfo"
version     = "1.0.0"
description = "System vitals: battery status segment plus a `sysinfo` dashboard"
author      = "aiTerminal"

[[var]]
id = "sys.batt"
exec = "pmset -g batt 2>/dev/null | grep -Eo '[0-9]+%' | head -1 || cat /sys/class/power_supply/BAT0/capacity 2>/dev/null | sed 's/$/%/'"
trim = true

[[segment]]
align = "right"
when = "sys.batt"
template = "🔋 {sys.batt}"
fg = "muted"
