name        = "Local (Ollama / LM Studio / vLLM)"
description = "A local, OpenAI-compatible server on localhost. No key needed."
kind        = "openai"
api_key_env = "OPENAI_API_KEY"
base_url    = "http://localhost:11434/v1/chat/completions"

[models."llama3.1"]
temperature    = 0.7
max_tokens     = 8000
context_window = 128000
enable_tools   = true

[models."qwen2.5-coder"]
temperature    = 0.7
max_tokens     = 8000
context_window = 32000
enable_tools   = true
