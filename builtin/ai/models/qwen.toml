name        = "Qwen (DashScope)"
description = "Alibaba Qwen via the DashScope OpenAI-compatible endpoint."
kind        = "qwen"
api_key_env = "DASHSCOPE_API_KEY"
base_url    = "https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions"

[models.qwen-max]
temperature    = 0.7
max_tokens     = 8000
context_window = 32000
enable_tools   = true

[models.qwen-plus]
temperature    = 0.7
max_tokens     = 8000
context_window = 131072
enable_tools   = true

[models."qwen2.5-coder-32b-instruct"]
temperature    = 0.7
max_tokens     = 8000
context_window = 131072
enable_tools   = true
